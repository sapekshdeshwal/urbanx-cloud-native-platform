services:

  frontend:
    image: nginx
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    image: ubuntu
    command: sleep infinity
    restart: unless-stopped

  postgres:
    image: postgres

    env_file:
      - .env

    restart: always

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres-data: